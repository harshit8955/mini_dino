📦 Orders Management
</h2>

<table class="orders-table">

<thead>

<tr>

<th data-en="Order ID" data-hi="ऑर्डर आईडी">Order ID</th>

<th data-en="Customer" data-hi="ग्राहक">Customer</th>

<th data-en="Plant" data-hi="पौधा">Plant</th>

<th data-en="Price" data-hi="कीमत">Price</th>

<th data-en="Status" data-hi="स्थिति">Status</th>

<th data-en="Action" data-hi="कार्य">Action</th>

</tr>

</thead>

<tbody id="orderTable">

</tbody>

</table>

<script src="assets/js/theme.js"></script>
<script src="assets/js/language.js"></script>


<script>

fetch("/api/orders")

.then(res=>res.json())

.then(data=>{

const table=document.getElementById("orderTable")

data.forEach(order=>{

table.innerHTML+=`

<tr>

<td>${order.id}</td>

<td>${order.customer}</td>

<td>${order.plant}</td>

<td>₹${order.price}</td>

<td>${order.status}</td>

<td>

<button onclick="updateStatus(${order.id},'Shipped')">Ship</button>

<button onclick="updateStatus(${order.id},'Delivered')">Deliver</button>

</td>

</tr>

`

})

})


function updateStatus(id,status){

fetch("/api/update-order",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({id,status})

})

.then(res=>res.json())

.then(data=>{

alert("Order Updated")

location.reload()

})

}

</script>
